name: Playwright .NET BDD Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build solution
        run: dotnet build --configuration Release --no-restore

      - name: Install Playwright Browsers
        run: pwsh .\PlaywrightDotNetBDDFramework\bin\Release\net10.0\playwright.ps1 install

      - name: Run tests
        run: dotnet test --configuration Release --no-build